name: Build JH Secure

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyflakes
        run: pip install pyflakes

      - name: Run lint
        run: python -m pyflakes src/jh_secure.py

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build EXE with PyInstaller
        run: pyinstaller jh_secure.spec --clean --noconfirm
        shell: pwsh

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "dist\JH Secure.exe"
          if (Test-Path $exe) {
            $mb = [math]::Round((Get-Item $exe).Length / 1MB, 2)
            Write-Host "Build successful - $mb MB"
          } else {
            Write-Error "EXE not found at $exe"
            exit 1
          }

      - name: Create release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist\JH Secure.exe" "release\JH Secure.exe"
          Write-Host "Packaged successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: JH-Secure-Windows
          path: release/
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: JH-Secure-Windows
          path: release-assets/

      - name: Zip release package
        run: |
          cd release-assets
          zip -r "../JH-Secure-${{ github.ref_name }}-Windows.zip" .
          echo "Created zip:"
          ls -lh "../JH-Secure-${{ github.ref_name }}-Windows.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JH Secure ${{ github.ref_name }}"
          body: |
            ## JH Secure ${{ github.ref_name }}
            Portable Folder Lock for Windows - No Installation Required

            ### Download
            Download the zip below, extract, and run `JH Secure.exe`

            ### Features
            - Lock any folder with 6-digit PIN
            - Fake Password (Decoy PIN) - shows fake files under pressure
            - Auto-Lock Timer (1 min to 1 hour)
            - Brute Force Protection - lockout after 5 wrong PINs
            - Change PIN using old PIN
            - Access Log and Failed Attempt Log
            - Batch Lock / Batch Unlock with Master PIN
            - Portable - works on any PC, no install needed

            ### How to use
            1. Run `JH Secure.exe`
            2. Browse and select a folder
            3. Click LOCK, set a 6-digit PIN and secret question
            4. The `.jhsecure` file travels with your folder
            5. On any PC - select folder, click UNLOCK, enter PIN

            Built with GitHub Actions
          files: "JH-Secure-${{ github.ref_name }}-Windows.zip"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
